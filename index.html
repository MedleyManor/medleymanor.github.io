<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medley Manor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            color: #f5f5f5;
        }
        .tagline {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 2.5rem;
        }
        .projects {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .project-card {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 2rem;
            width: 240px;
            text-align: center;
            text-decoration: none;
            color: #e0e0e0;
            transition: transform 0.2s, border-color 0.2s;
        }
        .project-card:hover {
            transform: translateY(-4px);
            border-color: #e94560;
        }
        .project-card h2 {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            color: #e94560;
        }
        .project-card p {
            font-size: 0.9rem;
            color: #999;
        }
        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Medley Manor</h1>
    <p class="tagline">Projects &amp; experiments</p>
    <div class="projects">
        <a href="projects/sfg/" class="project-card">
            <h2>SFG</h2>
            <p>Coming soon</p>
        </a>
    </div>
    <footer>&copy; 2025 MedleyManor</footer>
</body>
</html>
